services:
  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka-init:
    image: apache/kafka:4.3.0
    container_name: kafka-init
    depends_on:
      kafka: { condition: service_healthy }
    restart: "no"
    volumes:
      - ./scripts/kafka.initializer.sh:/kafka.initializer.sh:ro
    entrypoint: ["/bin/sh", "kafka.initializer.sh"]

  akhq:
    image: tchiotludo/akhq:0.27.1
    container_name: akhq
    ports:
      - "9093:8080"
    depends_on:
      - kafka
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local-kafka:
              properties:
                bootstrap.servers: "kafka:9092"

  rest-client:
    depends_on:
      kafka: { condition: service_healthy }
    ports:
      - "3000:3000"
    build:
      context: .
      args:
        SERVICE_NAME: "rest-client"
  literary-service:
    depends_on:
      kafka: { condition: service_healthy }
    build:
      context: .
      args:
        SERVICE_NAME: "literary-service"
  math-service:
    depends_on:
      kafka: { condition: service_healthy }
    build:
      context: .
      args:
        SERVICE_NAME: "math-service"
  tweet-service:
    depends_on:
      kafka: { condition: service_healthy }
    build:
      context: .
      args:
        SERVICE_NAME: "tweet-service"
